<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당신의 날씨 — mikihoo</title>
  <meta name="description" content="오늘 당신 곁의 날씨를 남겨주세요." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <a href="index.html" class="site-title">mikihoo / 微氣候</a>
    <nav class="site-nav">
      <a href="index.html">수기록</a>
      <a href="weather.html" class="active">당신의 날씨</a>
      <a href="artists.html">채집자</a>
    </nav>
  </header>

  <div class="weather-page">

  <!-- 실시간 날씨 바 -->
  <div class="weather-bar" id="weatherBar"></div>

  <main class="weather-main">

    <!-- 왼쪽: 입력 폼 -->
    <div class="weather-col-left" data-lenis-prevent>
      <section class="weather-intro">
        <h2>당신의 날씨</h2>
        <div class="weather-now" id="weatherNow"></div>
      </section>

      <form class="weather-form" id="weatherForm" novalidate>
        <div class="form-field">
          <label for="nickname">호칭 / 呼稱</label>
          <input type="text" id="nickname" name="nickname"
            placeholder="아무 이름이어도 됩니다" maxlength="30" autocomplete="off" />
        </div>

        <div class="form-field">
          <label for="message">일기 / 日記</label>
          <textarea id="message" name="message"
            placeholder="한두 문장이면 충분합니다" maxlength="200"></textarea>
        </div>

        <div class="form-field">
          <label>사진 (선택)</label>
          <label for="photo" class="file-label">파일 선택 —</label>
          <input type="file" id="photo" name="photo" accept="image/*" />
          <div class="file-name" id="fileName"></div>
          <div class="filter-status" id="filterStatus"></div>
          <img class="preview-img" id="previewImg" alt="" />
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">저장</button>
        <div class="form-status" id="formStatus"></div>
      </form>
    </div>

    <!-- 오른쪽: 타임라인 -->
    <div class="weather-col-right" data-lenis-prevent>

      <!-- 어드민 로그인 (admin 모드에서만 표시) -->
      <div id="weatherAdminLogin" style="display:none; margin-bottom:2rem; padding-bottom:2rem; border-bottom:1px solid var(--border);">
        <div class="admin-label" style="margin-bottom:1rem;">관리자 로그인</div>
        <div class="form-field">
          <label for="wAdminEmail">이메일</label>
          <input type="email" id="wAdminEmail" autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="wAdminPassword">비밀번호</label>
          <input type="password" id="wAdminPassword" autocomplete="current-password" />
        </div>
        <button class="btn-submit" id="wLoginBtn">로그인</button>
        <div class="form-status" id="wLoginStatus"></div>
      </div>

      <section class="entries-section">
        <div class="entries-label">남겨진 날씨들</div>
        <div class="timeline" id="entriesList">
          <p class="entries-empty">아직 아무것도 없습니다.</p>
        </div>
      </section>
    </div>

  </main>

  <footer class="site-footer">
    <span>mikihoo &copy; 2026</span>
    <a href="weather.html?admin" class="footer-admin" style="display:none;">관리</a>
  </footer>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
  <script src="weather.js"></script>
  <script src="grain.js"></script>
</body>
</html>
