<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미기후</title>
  <meta name="description" content="suheeson의 아카이브. 미기후." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="site-title">mikihoo / 微氣候</div>
    <nav class="site-nav">
      <a href="index.html" class="active">아카이브</a>
      <a href="weather.html">당신의 날씨</a>
    </nav>
  </header>

  <main class="main-list">

    <!-- 관리자 패널 -->
    <section class="admin-panel" id="adminPanel" style="display:none;">
      <div id="loginBox">
        <div class="admin-label">관리자</div>
        <div class="form-field">
          <label for="adminEmail">이메일</label>
          <input type="email" id="adminEmail" autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="adminPassword">비밀번호</label>
          <input type="password" id="adminPassword" autocomplete="current-password" />
        </div>
        <button class="btn-submit" id="loginBtn">로그인</button>
        <div class="form-status" id="loginStatus"></div>
      </div>

      <div id="writeBox" style="display:none;">
        <div class="admin-label">새 글</div>
        <div class="form-field">
          <label for="postTitle">제목</label>
          <input type="text" id="postTitle" maxlength="80" />
        </div>
        <div class="form-field">
          <label for="postDate">날짜 (예: 2026. 06)</label>
          <input type="text" id="postDate" maxlength="20" />
        </div>
        <div class="form-field">
          <label for="postExcerpt">본문</label>
          <textarea id="postExcerpt" style="height:6rem;" maxlength="300"></textarea>
        </div>
        <div class="form-field">
          <label>사진 (선택)</label>
          <label for="postPhoto" class="file-label">파일 선택 —</label>
          <input type="file" id="postPhoto" accept="image/*" />
          <div class="file-name" id="postFileName"></div>
          <img class="preview-img" id="postPreview" alt="" />
        </div>
        <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
          <button class="btn-submit" id="postBtn">올리다</button>
          <button class="btn-submit" id="logoutBtn" style="border-color:var(--text-faint);color:var(--text-faint);">로그아웃</button>
        </div>
        <div class="form-status" id="postStatus"></div>
      </div>
    </section>

    <!-- 아카이브 리스트 -->
    <div class="archive-list" id="archiveList">
      <div class="list-empty">—</div>
    </div>

  </main>

  <footer class="site-footer">
    <span>mikihoo &copy; 2026</span>
  </footer>

  <!-- 포스트 상세 모달 -->
  <div class="post-modal" id="postModal">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-inner">
      <img class="modal-img" id="modalImg" alt="" />
      <div class="modal-body">
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-excerpt" id="modalExcerpt"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
