<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미기후</title>
  <meta name="description" content="mikihoo의 아카이브. 미기후." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="pageContent" style="opacity:0;">

  <header class="site-header">
    <a href="index.html" class="site-title">mikihoo / 微氣候</a>
    <nav class="site-nav">
      <a href="index.html" class="active">아카이브</a>
      <a href="weather.html">당신의 날씨</a>
      <a href="artists.html">채집자</a>
    </nav>
  </header>

  <div class="weather-bar" id="indexWeatherBar"></div>

  <section class="hero">
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="hero.mp4" type="video/mp4" />
    </video>
    <div class="hero-fade"></div>
  </section>

  <main class="main-list">

    <!-- 관리자 패널 -->
    <section class="admin-panel" id="adminPanel" style="display:none;">
      <div id="loginBox">
        <div class="admin-label">관리자</div>
        <div class="form-field">
          <label for="adminEmail">이메일</label>
          <input type="email" id="adminEmail" autocomplete="username" />
        </div>
        <div class="form-field">
          <label for="adminPassword">비밀번호</label>
          <input type="password" id="adminPassword" autocomplete="current-password" />
        </div>
        <button class="btn-submit" id="loginBtn">로그인</button>
        <div class="form-status" id="loginStatus"></div>
      </div>

      <div id="writeBox" style="display:none;">
        <div class="admin-label">새 글</div>
        <div class="form-field">
          <label for="postTitle">제목</label>
          <input type="text" id="postTitle" maxlength="80" />
        </div>
        <div class="form-field">
          <label for="postDate">날짜 (예: 2026. 06)</label>
          <input type="text" id="postDate" maxlength="20" />
        </div>
        <div class="form-field">
          <label for="postArtist">아티스트</label>
          <input type="text" id="postArtist" maxlength="60" placeholder="mikihoo" />
        </div>
        <div class="form-field">
          <label for="postExcerpt">본문</label>
          <textarea id="postExcerpt" style="height:6rem;" maxlength="300"></textarea>
        </div>
        <div class="form-field">
          <label>사진 (여러 장 선택 가능)</label>
          <label for="postPhoto" class="file-label">파일 선택 —</label>
          <input type="file" id="postPhoto" accept="image/*" multiple />
          <div class="file-name" id="postFileName"></div>
          <div class="filter-status" id="postFilterStatus"></div>
          <div class="multi-preview" id="multiPreview"></div>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
          <button class="btn-submit" id="postBtn">올리다</button>
          <button class="btn-submit" id="logoutBtn" style="border-color:var(--text-faint);color:var(--text-faint);">로그아웃</button>
        </div>
        <div class="form-status" id="postStatus"></div>
      </div>
    </section>

    <!-- 아카이브 리스트 -->
    <div class="archive-list" id="archiveList">
      <div class="list-empty">—</div>
    </div>

  </main>

  <footer class="site-footer">
    <span>mikihoo &copy; 2026</span>
    <a href="index.html?admin" class="footer-admin" style="display:none;">관리</a>
  </footer>

  <!-- 포스트 상세 모달 -->
  <div class="post-modal" id="postModal">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-inner">
      <div class="modal-left">
        <div class="modal-body">
          <div class="modal-date" id="modalDate"></div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-excerpt" id="modalExcerpt"></div>
          <div class="modal-weather" id="modalWeather"></div>
        </div>
      </div>
      <div class="modal-right">
        <div class="modal-images" id="modalImages"></div>
      </div>
    </div>
  </div>

  </div><!-- /#pageContent -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
  <script src="lenis-init.js"></script>
  <script src="intro.js"></script>
  <script src="main.js"></script>
  <script src="grain.js"></script>
</body>
</html>
